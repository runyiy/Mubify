[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".venv",
    ".pytest_cache",
    ".ruff_cache",
    "alembic/versions",
    "chroma_db",
    "data",
    "datasets",
    "local_data",
]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I", "UP"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

